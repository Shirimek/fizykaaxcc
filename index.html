<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMistrz | Kurs Geografii Rozszerzonej</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --locked: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--locked);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-container {
            width: 200px;
            height: 10px;
            background: var(--locked);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .lesson-list { display: grid; gap: 15px; }

        .lesson-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid transparent;
            position: relative;
        }

        .lesson-card:hover:not(.locked) {
            transform: translateX(10px);
            background: #2d3a4f;
            border-color: var(--accent);
        }

        .lesson-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .lesson-icon {
            width: 50px;
            height: 50px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--accent);
            margin-right: 20px;
        }

        .lesson-info { flex-grow: 1; }
        .lesson-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .lesson-info span { font-size: 0.8rem; color: var(--text-muted); }

        .status-icon { font-size: 1.2rem; margin-left: 15px; }

        #lesson-view { display: none; }
        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .content-body {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .content-body h2 { margin-bottom: 20px; color: var(--accent); border-bottom: 2px solid var(--locked); padding-bottom: 10px; }
        .content-body p { margin-bottom: 15px; text-align: justify; }

        .quiz-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
        }

        .question-box { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--locked); }
        .options { margin-top: 10px; }
        
        .option-label {
            display: block;
            background: #2d3a4f;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover { background: #3e4e66; }
        .option-label input { margin-right: 10px; }

        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--error) !important; color: white; }

        #check-btn {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
        }

        #result-msg {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease forwards; }

    </style>
</head>

            content: `
                <h2>Kształt i wymiary Ziemi</h2>
                <p>Ziemia nie jest idealną kulą. Przez wieki poglądy na jej kształt ewoluowały. Dziś wiemy, że Ziemia jest <strong>geoidą</strong> – bryłą, której powierzchnia w każdym miejscu jest prostopadła do pionu (kierunku siły ciężkości). W uproszczeniu kartograficznym przyjmuje się model elipsoidy obrotowej.</p>
                <p>Promień równikowy Ziemi wynosi około 6378 km, natomiast promień biegunowy jest o ok. 21 km krótszy. Ta różnica wynika z siły odśrodkowej powstałej podczas ruchu obrotowego planety wokół własnej osi. Powierzchnia Ziemi to ok. 510 mln km², z czego ponad 70% zajmują oceany.</p>
                <h3>Układ Słoneczny</h3>
                <p>Ziemia jest trzecią planetą od Słońca w Układzie Słonecznym. Należy do grupy planet typu ziemskiego (skalistych), charakteryzujących się dużą gęstością i stałą skorupą. Jej unikalną cechą jest obecność wody w trzech stanach skupienia oraz atmosfera bogata w tlen, co umożliwiło rozwój życia. Magnetosfera Ziemi chroni nas przed szkodliwym promieniowaniem kosmicznym i wiatrem słonecznym.</p>
            `,
            questions: [
                { q: "Jak nazywa się rzeczywisty kształt Ziemi?", options: ["Kula", "Geoida", "Elipsa", "Stożek"], correct: 1 },

                { q: "Co chroni Ziemię przed wiatrem słonecznym?", options: ["Księżyc", "Magnetosfera", "Ozon", "Chmury"], correct: 1 }

        },
        {
            id: 2,
            title: "Ruchy Ziemi i ich następstwa",
            date: "Rozdział 1.2",
            icon: "fa-sync",
            content: `
                <h2>Ruch obrotowy i obiegowy</h2>
                <p>Ziemia wykonuje dwa główne rodzaje ruchów: obrotowy (wokół własnej osi) oraz obiegowy (wokół Słońca). Ruch obrotowy trwa 23 godziny 56 minut i 4 sekundy. Następstwem tego ruchu jest przede wszystkim dobowa zmiana dnia i nocy.</p>
                <p>Ruch obiegowy odbywa się po orbicie o kształcie elipsy, a pełne okrążenie trwa 365 dni, 5 godzin, 48 minut i 46 sekund. Oś ziemska jest nachylona do płaszczyzny ekliptyki pod kątem ok. 66°33'.</p>
                <h3>Następstwa ruchów</h3>
                <p>Głównym skutkiem ruchu obiegowego jest występowanie astronomicznych pór roku. Ruch obrotowy natomiast powoduje powstawanie siły Coriolisa, która odchyla kierunek poruszania się ciał.</p>
            `,
            questions: [
                { q: "W którą stronę obraca się Ziemia?", options: ["Ze wschodu na zachód", "Z zachodu na wschód"], correct: 1 },
                { q: "Siła Coriolisa odchyla wiatry na półkuli północnej w:", options: ["Lewo", "Prawo", "W ogóle nie odchyla", "W dół"], correct: 1 },

                <h2>Szerokość i długość geograficzna</h2>
                <p>Współrzędne geograficzne to podstawowe narzędzie nawigacji. Dzielą się na szerokość (φ) oraz długość (λ) geograficzną.</p>
                <p><strong>Szerokość geograficzna</strong> to kąt między płaszczyzną równika a promieniem ziemskim. Przyjmuje wartości od 0° do 90° N lub S.</p>
                <p><strong>Długość geograficzna</strong> to kąt dwuścienny między południkiem zerowym a południkiem danego punktu. Przyjmuje wartości od 0° do 180° E lub W.</p>

                <p>1. <strong>Skorupa ziemska</strong>: Najbardziej zewnętrzna, sztywna warstwa. Dzieli się na kontynentalną (grubszą) i oceaniczną (cieńszą, ale gęstszą).<br>

            content: `
                <h2>Skarby skorupy ziemskiej</h2>
        <p>Wszystko, co widzimy pod stopami – od monumentalnych Tatr po piasek na plaży – składa się z minerałów i skał. <strong>Minerał</strong> to pierwiastek lub związek chemiczny powstały w sposób naturalny, posiadający określoną strukturę krystaliczną (np. diament czy kwarc). <strong>Skała</strong> natomiast to naturalne skupisko jednego lub wielu minerałów.</p>
        <p>Skały dzielimy na trzy główne grupy ze względu na ich genezę. <strong>Skały magmowe</strong> powstają w wyniku krzepnięcia magmy (głębinowe, np. granit o strukturze jawno-krystalicznej) lub lawy (wylewne, np. bazalt o strukturze skrytokrystalicznej). <strong>Skały osadowe</strong> tworzą się na powierzchni Ziemi poprzez gromadzenie się materiału. Mogą być okruchowe (piaskowiec), pochodzenia organicznego (węgiel, wapienie) lub chemicznego (sól kamienna). Trzecią grupą są <strong>skały metamorficzne</strong>, które powstają, gdy istniejące już skały zostają poddane ogromnemu ciśnieniu i temperaturze w głębi Ziemi, co zmienia ich strukturę (np. marmur powstały z wapienia).</p>
        <p>Ciekawostką jest obieg materii w przyrodzie: każda skała może stać się inną w procesie cyklu skalnego. Co więcej, twardość minerałów określamy za pomocą 10-stopniowej skali Mohsa, gdzie 1 to miękki talk, a 10 to najtwardszy diament.</p>
    `,

            content: `
                <h2>Błękitna Planeta i jej zasoby</h2>
                <p>Ziemia jest nazywana błękitną planetą, ponieważ wody (hydrosfera) pokrywają aż 71% jej powierzchni. Jednak <strong>97,5% to wody słone</strong> w oceanach i morzach. Wody słodkie to zaledwie 2,5%, z czego większość uwięziona jest w lodowcach i lądolodach (Antarktyda, Grenlandia). Woda dostępna do bezpośredniego spożycia przez człowieka (rzeki, jeziora, płytkie wody podziemne) to zaledwie ułamek procenta wszystkich zasobów.</p>
                <p>Woda na Ziemi jest w ciągłym ruchu, co nazywamy <strong>cyklem hydrologicznym</strong>. Składa się on z parowania (z oceanów i roślin – transpiracja), przemieszczania wilgoci w atmosferze, opadów oraz odpływu powierzchniowego i podziemnego. Oceany pełnią rolę gigantycznego magazynu ciepła, stabilizując klimat globu poprzez prądy morskie.</p>

                <h2>Dzieje Ziemi i Tabela Stratygraficzna</h2>
                <p>Historia naszej planety liczy około 4,6 miliarda lat. Dzielimy ją na eony, ery, okresy i epoki. Kluczowym narzędziem geologa jest tabela stratygraficzna. Wyróżniamy ery: Archozoiczną, Proterozoiczną (prekambr), Paleozoiczną, Mezozoiczną oraz Kenozoiczną. Każda z nich charakteryzowała się innymi procesami górotwórczymi (orogenezami). Najstarsza to orogeneza kaledońska (sylur/dewon), następnie hercyńska (karbon/perm) oraz najmłodsza i najpotężniejsza – alpejska, która trwa do dziś i uformowała najwyższe łańcuchy górskie świata, jak Himalaje, Alpy czy Tatry.</p>

                <h2>Budowa geologiczna i krajobraz Polski</h2>

                <h2>Warunki atmosferyczne i zasoby wodne kraju</h2>
                <p>Klimat Polski określa się jako umiarkowany ciepły przejściowy. Ta "przejściowość" oznacza ścieranie się mas powietrza oceanicznego (z zachodu) i kontynentalnego (ze wschodu). Powoduje to dużą zmienność pogody z dnia na dzień i z roku na rok. Dominują masy powietrza polarnomorskiego (PPm), które przynoszą chłód latem i odwilż zimą. Powietrze polarnokontynentalne (PPk) daje upały latem i silne mrozy zimą. W Polsce wyróżniamy aż 6 termicznych pór roku, w tym przedwiośnie i przedzimie.</p>
                <p>Średnia roczna suma opadów w Polsce wynosi około 600 mm, jednak jest ona zróżnicowana – od ponad 1000 mm w górach do poniżej 500 mm w Wielkopolsce (tzw. cień opadowy pojezierzy). Polska boryka się z problemem deficytu wody. Zasoby wody przypadające na jednego mieszkańca są jednymi z najniższych w Europie. Przyczyną jest nie tylko niska suma opadów, ale także ich nierównomierność oraz wysokie parowanie w okresach letnich.</p>

                <h2>System ochrony dziedzictwa naturalnego</h2>
                <p>Ochrona przyrody w Polsce ma długą tradycję, sięgającą czasów królewskich (ochrona tura, żubra). Obecnie najważniejszą formą ochrony są Parki Narodowe, których mamy 23. Najstarszy to Pieniński (lub Białowieski, zależnie od definicji powstania jednostki), a największy to Biebrzański Park Narodowy, chroniący ogromne obszary bagienne. Parki Narodowe obejmują obszary o powierzchni powyżej 1000 ha, na których ochronie podlega cała przyroda oraz walory krajobrazowe. Wokół parków tworzy się otuliny, aby chronić je przed szkodliwym wpływem czynników zewnętrznych.</p>
                <p>Inne formy ochrony to: Parki Krajobrazowe (mniej rygorystyczne, dopuszczające gospodarkę rolną i leśną), Rezerwaty Przyrody (chroniące konkretne gatunki lub formy terenu), Pomniki Przyrody (pojedyncze obiekty, np. stare drzewo Dąb Bartek) oraz ochrona gatunkowa roślin i zwierząt. Polska bierze udział w europejskim programie Natura 2000, który ma na celu ochronę zagrożonych siedlisk i gatunków na poziomie całego kontynentu. Ważną rolę pełnią też parki narodowe o charakterze transgranicznym (np. Tatrzański PN współpracujący ze słowackim TANAP-em).</p>
                <p>Ochrona przyrody to nie tylko zakazy, ale też edukacja i turystyka edukacyjna. Symbolem polskich parków narodowych są zwierzęta, np. żubr (Białowieski), orzeł bielik (Woliński) czy salamandra (Gorczański). Problemem ochrony przyrody jest presja inwestycyjna (budowa dróg, hoteli) oraz zmiany klimatyczne, które zmieniają warunki życia chronionych gatunków. Dbając o polską przyrodę, zachowujemy unikalne skarby, jakimi są m.in. ostatnie fragmenty lasów pierwotnych Europy.</p>

                <h2>Rodzaje Ptaków W Polsce</h2>
                <p><h>Bocian biały</h> - symbol polskiej wsi. Duży ptak o białym upierzeniu z czarnymi lotkami, czerwonym dziobie i nogach. Buduje ogromne gniazda na dachach i słupach.</p>
                <p><h>Zięba</h> - jeden z najliczniejszych ptaków w polskich lasach. Samiec ma charakterystyczną rdzawą pierś i szaroniebieską czapeczkę.</p>

    let currentLesson = null;
    let unlockedLessons = JSON.parse(localStorage.getItem('geo_unlocked')) || [1];

    function init() {
        renderLessonList();
        updateProgress();
    }

    function renderLessonList() {
        const listContainer = document.getElementById('list-view');
        listContainer.innerHTML = '';

        lessonsData.forEach((lesson) => {
            const isLocked = !unlockedLessons.includes(lesson.id);
            const isCompleted = unlockedLessons.includes(lesson.id + 1);
            
            const card = document.createElement('div');
            card.className = `lesson-card ${isLocked ? 'locked' : ''} fade-in`;
            card.onclick = () => !isLocked && openLesson(lesson.id);

            card.innerHTML = `
                <div class="lesson-icon">
                    <i class="fas ${isLocked ? 'fa-lock' : lesson.icon}"></i>
                </div>
                <div class="lesson-info">
                    <span>${lesson.date}</span>
                    <h3>Lekcja ${lesson.id}: ${lesson.title}</h3>
                </div>
                <div class="status-icon">
                    ${isCompleted ? '<i class="fas fa-check-circle" style="color:var(--success)"></i>' : 
                      (isLocked ? '' : '<i class="fas fa-chevron-right"></i>')}
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    function openLesson(id) {
        currentLesson = lessonsData.find(l => l.id === id);
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('lesson-view').style.display = 'block';
        
        document.getElementById('lesson-content').innerHTML = currentLesson.content;
        
        const quizContainer = document.getElementById('quiz-container');
        quizContainer.innerHTML = '';
        
        currentLesson.questions.forEach((q, qIdx) => {
            const qBox = document.createElement('div');
            qBox.className = 'question-box';
            qBox.innerHTML = `<p><strong>Pytanie ${qIdx+1}:</strong> ${q.q}</p>
                <div class="options">
                    ${q.options.map((opt, oIdx) => `
                        <label class="option-label">
                            <input type="radio" name="q${qIdx}" value="${oIdx}">
                            ${opt}
                        </label>
                    `).join('')}
                </div>`;
            quizContainer.appendChild(qBox);
        });

        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('result-msg').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function showListView() {
        document.getElementById('list-view').style.display = 'grid';
        document.getElementById('lesson-view').style.display = 'none';
        renderLessonList();
    }

    function checkQuiz() {
        const questions = currentLesson.questions;
        let score = 0;
        
        questions.forEach((q, qIdx) => {
            const selected = document.querySelector(`input[name="q${qIdx}"]:checked`);
            const labels = document.querySelectorAll(`input[name="q${qIdx}"]`);
            
            labels.forEach(input => {
                const label = input.parentElement;
                const val = parseInt(input.value);
                
                if(val === q.correct) label.classList.add('correct');
                if(selected && parseInt(selected.value) === val && val !== q.correct) {
                    label.classList.add('wrong');
                }
                input.disabled = true;
            });

            if(selected && parseInt(selected.value) === q.correct) score++;
        });

        const percent = (score / questions.length) * 100;
        const msg = document.getElementById('result-msg');
        msg.style.display = 'block';

        if(percent >= 80) {
            msg.innerHTML = `<span style="color:var(--success)">Zaliczone! ✅ Wynik: ${score}/${questions.length}</span>`;
            if(!unlockedLessons.includes(currentLesson.id + 1) && currentLesson.id < lessonsData.length) {
                unlockedLessons.push(currentLesson.id + 1);
                localStorage.setItem('geo_unlocked', JSON.stringify(unlockedLessons));
            }
        } else {
            msg.innerHTML = `<span style="color:var(--error)">Spróbuj ponownie ❌ Wynik: ${score}/${questions.length} (wymagane 80%)</span>`;
        }

        document.getElementById('check-btn').style.display = 'none';
        updateProgress();
    }

    function updateProgress() {
        const total = lessonsData.length;
        const completed = unlockedLessons.length - 1;
        const percent = Math.round((completed / total) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `Postęp: ${percent}%`;
    }

    init();
</script>
