<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fizyka | Kurs Fizyki</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --locked: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--locked);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-container {
            width: 200px;
            height: 10px;
            background: var(--locked);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        #progress-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .lesson-list { display: grid; gap: 15px; }

        .lesson-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid transparent;
            position: relative;
        }

        .lesson-card:hover:not(.locked) {
            transform: translateX(10px);
            background: #2d3a4f;
            border-color: var(--accent);
        }

        .lesson-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        .lesson-icon {
            width: 50px;
            height: 50px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: var(--accent);
            margin-right: 20px;
        }

        .lesson-info { flex-grow: 1; }
        .lesson-info h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .lesson-info span { font-size: 0.8rem; color: var(--text-muted); }

        .status-icon { font-size: 1.2rem; margin-left: 15px; }

        #lesson-view { display: none; }
        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .content-body {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .content-body h2 { margin-bottom: 20px; color: var(--accent); border-bottom: 2px solid var(--locked); padding-bottom: 10px; }
        .content-body p { margin-bottom: 15px; text-align: justify; }

        .quiz-section {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
        }

        .question-box { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--locked); }
        .options { margin-top: 10px; }
        
        .option-label {
            display: block;
            background: #2d3a4f;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option-label:hover { background: #3e4e66; }
        .option-label input { margin-right: 10px; }

        .correct { background: var(--success) !important; color: white; }
        .wrong { background: var(--error) !important; color: white; }

        #check-btn {
            background: var(--accent);
            color: var(--bg-dark);
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
        }

        #result-msg {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease forwards; }

    </style>
</head>
<body>

<header>
    <div>
        <h1>Fizyka <i class="fas fa-calculator"></i></h1>

<script>
    const lessonsData = [
        {
        id: 1,
        title: "Napięcie i Natężenie – Podstawa Energii",
        date: "Lekcja 1",
        icon: "fa-bolt",
        content: `
            <h2>Czym właściwie jest prąd?</h2>
            <p>Wyobraź sobie rzekę. <strong>Napięcie (U)</strong> to różnica wysokości między źródłem a ujściem – im większa góra, tym silniej woda chce płynąć. Mierzymy je w <strong>Woltach (V)</strong>. <strong>Natężenie (I)</strong> to z kolei ilość wody, która przepływa przez koryto w każdej sekundzie. Mierzymy je w <strong>Amperach (A)</strong>.</p>
            <p>W Twoim projekcie bateria 9V ma niskie napięcie, ale moduł Step-Up "buduje ogromną górę", podbijając napięcie do tysięcy woltów. Dlaczego? Ponieważ ludzka skóra stawia opór. Niskie napięcie nie ma siły "przepchnąć" prądu przez Twój suchy naskórek. Wysokie napięcie pokonuje tę barierę, pozwalając elektronom na ruch.</p>
            <h3>Rola przewodników</h3>
            <p>Elektrony płyną swobodnie w metalach (miedź, aluminium) i elektrolitach (np. słona woda lub pot). Materiały te nazywamy przewodnikami. Drewno, plastik czy sucha guma to izolatory – one więżą elektrony i nie pozwalają im na ruch. Twoje urządzenie wykorzystuje kable jako autostradę dla elektronów, a Twoją skórę jako ostatni przystanek przed "kopnięciem".</p>
        `,
        questions: [
            { q: "W jakiej jednostce mierzymy napięcie?", options: ["Amper", "Wolt", "Om", "Wat"], correct: 1 },
            { q: "Co symbolizuje litera 'I' w fizyce?", options: ["Opór", "Moc", "Natężenie", "Napięcie"], correct: 2 },
            { q: "Który materiał jest dobrym przewodnikiem?", options: ["Plastik", "Miedź", "Guma", "Szkło"], correct: 1 },
            { q: "Co robi moduł Step-Up?", options: ["Zmniejsza napięcie", "Podnosi napięcie", "Zmienia kolor prądu", "Nic nie robi"], correct: 1 },
            { q: "Czym są izolatory?", options: ["Dobrze przewodzą prąd", "Blokują przepływ prądu", "Magazynują prąd", "Są tylko z metalu"], correct: 1 },
            { q: "Jednostką natężenia jest:", options: ["V", "Ω", "W", "A"], correct: 3 },
            { q: "Czy sucha skóra stawia opór prądowi?", options: ["Tak", "Nie"], correct: 0 },
            { q: "Bateria 9V to źródło prądu:", options: ["Zmiennego", "Stałego", "Wysokiego napięcia"], correct: 1 }
        ]
    },
    {
        id: 2,
        title: "Prawo Ohma i Magia Rezystorów",
        date: "Lekcja 2",
        icon: "fa-calculator",
        content: `
            <h2>Najważniejsze prawo elektroniki</h2>
            <p>Prawo Ohma to fundament każdego urządzenia elektrycznego. Wyraża się wzorem: <strong>I = U / R</strong>. Oznacza to, że natężenie prądu jest wprost proporcjonalne do napięcia i odwrotnie proporcjonalne do oporu. Jeśli zwiększysz opór, natężenie spadnie.</p>
            <p>W Twoim projekcie rezystor <strong>500 kΩ (500 000 Omów)</strong> pełni rolę "strażnika". Nawet jeśli generator wytwarza 10 000V, rezystor stawia tak potężny opór, że przez ciało przepływa znikoma, bezpieczna ilość elektronów. Bez tego rezystora, prąd byłby na tyle silny, że mógłby spowodować trwałe uszkodzenia tkanek lub serca.</p>
            <h3>Dlaczego 500k a nie 100?</h3>
            <p>Rezystancja rzędu 500k-1M Ω ogranicza natężenie do poziomu mikroamperów. Jest to tzw. próg percepcji – czujemy mrowienie lub ukłucie, ale nasze mięśnie nie wchodzą w stan skurczu tężcowego (paraliżu). To sprawia, że Twój szkolny eksperyment pozostaje widowiskowy, ale kontrolowany i bezpieczny.</p>
        `,
        questions: [
            { q: "Jak brzmi wzór na natężenie (Prawo Ohma)?", options: ["I = U*R", "I = R/U", "I = U/R", "U = I/R"], correct: 2 },
            { q: "Co się stanie z prądem, gdy opór (R) wzrośnie?", options: ["Wzrośnie", "Zmaleje", "Nie zmieni się"], correct: 1 },
            { q: "W czym mierzymy opór elektryczny?", options: ["Woltach", "Amperach", "Omach", "Watach"], correct: 2 },
            { q: "Ile to jest 1 MΩ?", options: ["1 000 Ω", "10 000 Ω", "1 000 000 Ω", "100 Ω"], correct: 2 },

            { q: "Czy mokre ręce mają mniejszy opór niż suche?", options: ["Tak", "Nie"], correct: 0 },
            { q: "Jak nazywa się element stawiający opór?", options: ["Kondensator", "Dioda", "Rezystor", "Tranzystor"], correct: 2 },
            { q: "Symbol Om (jednostka oporu) to:", options: ["A", "V", "Ω", "W"], correct: 2 }
        ]
    },
    {
        id: 3,
        title: "Obwody: Szeregowe i Równoległe",
        date: "Lekcja 3",
        icon: "fa-project-diagram",
        content: `
            <h2>Jak płynie prąd?</h2>
            <p>W elektronice wyróżniamy dwa podstawowe sposoby łączenia elementów. <strong>Połączenie szeregowe</strong> przypomina kolejkę – prąd musi przejść przez każdy element po kolei. Jeśli jeden kabel się urwie, cały układ przestaje działać. W Twoim projekcie rezystor i Twoje ciało są połączone właśnie szeregowo.</p>
            <p><strong>Połączenie równoległe</strong> to sytuacja, w której prąd ma wybór – może płynąć kilkoma drogami naraz. Tak połączone są gniazdka w Twoim domu. Jeśli wyłączysz lampkę, telewizor w innym gniazdku nadal działa.</p>
            <h3>Rozdzielanie prądu na palce</h3>
            <p>Jeśli chcesz mieć elektrody na 5 palcach, stosujesz połączenie równoległe odchodzące od głównego kabla. Każdy palec staje się osobną drogą dla elektronów. Ważne jest jednak, aby na każdej z tych dróg znalazł się rezystor, aby zachować stały poziom bezpieczeństwa niezależnie od tego, iloma palcami dotkniesz kolegi.</p>
        `,
        questions: [
            { q: "W którym połączeniu prąd płynie tylko jedną drogą?", options: ["Równoległym", "Szeregowym", "Mieszanym"], correct: 1 },
            { q: "Co się stanie w układzie szeregowym, gdy jeden element zawiedzie?", options: ["Prąd płynie dalej", "Obwód zostaje przerwany", "Napięcie rośnie"], correct: 1 },
            { q: "Gniazdka w domu są połączone:", options: ["Szeregowo", "Równolegle", "Nie są połączone"], correct: 1 },
            { q: "Dwa rezystory 1M połączone równolegle dają opór:", options: ["2M", "500k", "1M", "0"], correct: 1 },
            { q: "W Twoim projekcie rezystor i palec są połączone:", options: ["Szeregowo", "Równolegle"], correct: 0 },
            { q: "Napięcie w połączeniu równoległym jest:", options: ["Sumowane", "Takie samo na każdym odbiorniku", "Zawsze równe 0"], correct: 1 },
            { q: "Gdzie prąd ma 'wybór' drogi?", options: ["W szeregu", "W połączeniu równoległym"], correct: 1 },
            { q: "Dwa rezystory 500k połączone szeregowo dają:", options: ["250k", "500k", "1M", "100k"], correct: 2 }
        ]
    },
    {
        id: 4,
        title: "Energia i Moc – Czy bateria wytrzyma?",
        date: "Lekcja 4",
        icon: "fa-battery-full",
        content: `
            <h2>Moc prądu elektrycznego</h2>
            <p>Moc (P) to szybkość, z jaką prąd wykonuje pracę. Wzór na moc to <strong>P = U * I</strong> (Waty = Wolty * Ampery). W Twoim urządzeniu, mimo wysokiego napięcia, moc wyjściowa jest bardzo mała, ponieważ natężenie jest ograniczone przez rezystor. To dlatego bateria 9V nie wyładowuje się w sekundę.</p>
            <p>Pojemność baterii podaje się w <strong>miliamperogodzinach (mAh)</strong>. Jeśli Twoja bateria ma 500 mAh, oznacza to, że może dawać prąd 500 mA przez jedną godzinę lub 1 mA przez 500 godzin. Twój moduł Step-Up podczas "strzału" pobiera sporo prądu, ale trwa to ułamki sekund.</p>
            <h3>Sprawność układu</h3>
            <p>Nic w przyrodzie nie jest darmowe. Podczas podnoszenia napięcia, część energii zamienia się w ciepło. Dlatego moduły Step-Up mogą się lekko nagrzewać. Używanie baterii alkalicznych jest kluczowe, ponieważ potrafią one oddać dużą porcję energii w krótkim czasie bez drastycznego spadku napięcia.</p>
        `,
        questions: [
            { q: "Jednostką mocy jest:", options: ["Wolt", "Amper", "Wat", "Dżul"], correct: 2 },
            { q: "Wzór na moc (P) to:", options: ["U / I", "U * I", "R * I", "U + I"], correct: 1 },
            { q: "Co oznacza skrót mAh na baterii?", options: ["Moc", "Napięcie", "Pojemność", "Opór"], correct: 2 },
            { q: "Bateria 500mAh daje 500mA przez:", options: ["10 godzin", "1 godzinę", "1 minutę", "Cały dzień"], correct: 1 },
            { q: "Na co zamienia się tracona energia w module?", options: ["W światło", "W dźwięk", "W ciepło", "W magnetyzm"], correct: 2 },
            { q: "Dlaczego używamy baterii alkalicznych?", options: ["Są lżejsze", "Są wydajniejsze", "Są tańsze", "Mają ładniejszy kolor"], correct: 1 },
            { q: "Czy moc w Twoim urządzeniu jest groźna?", options: ["Tak", "Nie, bo natężenie jest bardzo małe"], correct: 1 },
            { q: "Jaką literą oznaczamy Moc?", options: ["M", "P", "W", "U"], correct: 1 }
        ]

    {
        id: 5,
        title: "Fizjologia i BHP – Dlaczego prąd kopie?",
        date: "Lekcja 5",
        icon: "fa-heartbeat",
        content: `
            <h2>Prąd a ludzkie ciało</h2>
            <p>Ludzki układ nerwowy działa na impulsy elektryczne. Kiedy prąd z zewnątrz dostaje się do ciała, "oszukuje" mózg i mięśnie. Przy małym natężeniu (Twoje urządzenie) czujemy mrowienie. Przy większym (powyżej 10-20 mA) mięśnie kurczą się tak silnie, że nie możemy puścić kabla – to tzw. próg nie-puszczania.</p>
            <p>Najgroźniejsza droga prądu to <strong>lewa ręka – prawa noga</strong> lub <strong>ręka – ręka</strong>, ponieważ na tej drodze znajduje się serce. Prąd może zakłócić naturalny rytm serca, doprowadzając do migotania komór. Dlatego Twój projekt na jedną rękę jest o wiele bezpieczniejszy – prąd zamyka się tylko w obrębie ramienia.</p>
            <h3>Bezpieczeństwo w szkole</h3>
            <p>Nigdy nie używamy prądu z gniazdka (230V) do takich projektów. Prąd przemienny w gniazdku jest 50 razy na sekundę zmienny, co jest zabójcze dla rytmu serca. Bateria 9V DC (prąd stały) w połączeniu z rezystorem ograniczającym to jedyna dopuszczalna droga dla amatorskich pokazów fizycznych.</p>
        `,
        questions: [
            { q: "Jaki organ jest najbardziej zagrożony przez prąd?", options: ["Płuca", "Serce", "Żołądek", "Wątroba"], correct: 1 },
            { q: "Dlaczego projekt na jedną rękę jest bezpieczniejszy?", options: ["Bo mniej kabli", "Bo omija serce", "Bo szybciej działa"], correct: 1 },
            { q: "Co to jest próg nie-puszczania?", options: ["Gdy prąd jest za słaby", "Skurcz mięśni uniemożliwiający puszczenie", "Brak baterii"], correct: 1 },
            { q: "Napięcie w gniazdku domowym to:", options: ["9V", "110V", "230V", "1000V"], correct: 2 },
            { q: "Czy wolno dotykać prądu mając mokre ręce?", options: ["Tak", "Nie, bo opór drastycznie spada"], correct: 1 },
            { q: "Jak nazywa się nieskoordynowana praca serca przez prąd?", options: ["Zawał", "Migotanie komór", "Nadciśnienie"], correct: 1 },
            { q: "Bezpieczne natężenie w Twoim projekcie to:", options: ["Poniżej 1 mA", "10 A", "100 mA", "1 A"], correct: 0 },
            { q: "Dlaczego prąd stały (DC) z baterii jest bezpieczniejszy?", options: ["Nie ma częstotliwości 50Hz", "Jest zimniejszy", "Ma ładniejszy symbol"], correct: 0 }
        ]
    },
    {
        id: 6,
        title: "Zjawisko Indukcji i Moduł Step-Up",
        date: "Lekcja 6",
        icon: "fa-redo",
        content: `
            <h2>Jak z 9V zrobić 10 000V?</h2>
            <p>Magia Twojego urządzenia kryje się w zjawisku <strong>indukcji elektromagnetycznej</strong>. Wewnątrz modułu Step-Up znajduje się mały transformator (cewka). Gdy prąd z baterii gwałtownie przepływa przez jedną cewkę i zostaje przerwany, w drugiej cewce (która ma znacznie więcej zwojów) indukuje się ogromne napięcie.</p>
            <p>Można to porównać do huśtawki – małe, ale szybkie pchnięcia (impulsy z baterii) pozwalają rozhuśtać napięcie do ogromnych wysokości. Prąd stały z baterii musi być "szatkowany" przez układ elektroniczny, aby indukcja mogła zajść, ponieważ transformatory działają tylko na prądzie zmiennym lub pulsującym.</p>
            <h3>Dlaczego iskra "strzela"?</h3>
            <p>Gdy napięcie na Twoim palcu osiągnie ok. 3 000V na każdy milimetr odległości, powietrze przestaje być izolatorem i zamienia się w plazmę. To właśnie ta mała niebieska iskierka, którą widzisz. Iskra to nic innego jak gwałtowny przepływ elektronów przez kanał zjonizowanego powietrza.</p>
        `,
        questions: [
            { q: "Jak nazywa się zjawisko podnoszenia napięcia w cewce?", options: ["Kondukcja", "Indukcja", "Redukcja", "Produkcja"], correct: 1 },
            { q: "Ile woltów potrzeba na 1 mm iskry w powietrzu?", options: ["10V", "230V", "ok. 3000V", "100 000V"], correct: 2 },
            { q: "Co znajduje się wewnątrz modułu Step-Up?", options: ["Mały silnik", "Transformator/Cewka", "Magnesy", "Woda"], correct: 1 },
            { q: "Zjawisko indukcji odkrył:", options: ["Newton", "Faraday", "Einstein", "Darwin"], correct: 1 },
            { q: "Czy transformator działa na idealnie stałym prądzie?", options: ["Tak", "Nie, musi być zmienny lub pulsujący"], correct: 1 },
            { q: "Iskra elektryczna to w rzeczywistości:", options: ["Ogień", "Zjonizowane powietrze (plazma)", "Para wodna"], correct: 1 },
            { q: "Większa liczba zwojów w cewce wyjściowej oznacza:", options: ["Mniejsze napięcie", "Większe napięcie", "Brak prądu"], correct: 1 },
            { q: "Moduł Step-Up zamienia energię magnetyczną na:", options: ["Chemiczną", "Elektryczną", "Mechaniczną"], correct: 1 }
        ]
    },
    {
        id: 7,
        title: "Kondensatory i Statyka – Magazynowanie Ładunku",
        date: "Lekcja 7",
        icon: "fa-cloud-bolt",
        content: `
            <h2>Elektroniczne zbiorniki energii</h2>
            <p>Kondensator to element, który magazynuje ładunek elektryczny. Działa jak zbiornik na wodę – napełnia się powoli, ale może oddać całą energię w jednej sekundzie. W Twoim generatorze kondensatory pomagają wzmocnić impuls, który czuje osoba dotknięta.</p>

    let currentLesson = null;
    let unlockedLessons = JSON.parse(localStorage.getItem('geo_unlocked')) || [1];

    function init() {
        renderLessonList();
        updateProgress();
    }

    function renderLessonList() {
        const listContainer = document.getElementById('list-view');
        listContainer.innerHTML = '';

        lessonsData.forEach((lesson) => {
            const isLocked = !unlockedLessons.includes(lesson.id);
            const isCompleted = unlockedLessons.includes(lesson.id + 1);
            
            const card = document.createElement('div');
            card.className = `lesson-card ${isLocked ? 'locked' : ''} fade-in`;
            card.onclick = () => !isLocked && openLesson(lesson.id);

            card.innerHTML = `
                <div class="lesson-icon">
                    <i class="fas ${isLocked ? 'fa-lock' : lesson.icon}"></i>
                </div>
                <div class="lesson-info">
                    <span>${lesson.date}</span>
                    <h3>Lekcja ${lesson.id}: ${lesson.title}</h3>
                </div>
                <div class="status-icon">
                    ${isCompleted ? '<i class="fas fa-check-circle" style="color:var(--success)"></i>' : 
                      (isLocked ? '' : '<i class="fas fa-chevron-right"></i>')}
                </div>
            `;
            listContainer.appendChild(card);
        });
    }

    function openLesson(id) {
        currentLesson = lessonsData.find(l => l.id === id);
        document.getElementById('list-view').style.display = 'none';
        document.getElementById('lesson-view').style.display = 'block';
        
        document.getElementById('lesson-content').innerHTML = currentLesson.content;
        
        const quizContainer = document.getElementById('quiz-container');
        quizContainer.innerHTML = '';
        
        currentLesson.questions.forEach((q, qIdx) => {
            const qBox = document.createElement('div');
            qBox.className = 'question-box';
            qBox.innerHTML = `<p><strong>Pytanie ${qIdx+1}:</strong> ${q.q}</p>
                <div class="options">
                    ${q.options.map((opt, oIdx) => `
                        <label class="option-label">
                            <input type="radio" name="q${qIdx}" value="${oIdx}">
                            ${opt}
                        </label>
                    `).join('')}
                </div>`;
            quizContainer.appendChild(qBox);
        });

        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('result-msg').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function showListView() {
        document.getElementById('list-view').style.display = 'grid';
        document.getElementById('lesson-view').style.display = 'none';
        renderLessonList();
    }

    function checkQuiz() {
        const questions = currentLesson.questions;
        let score = 0;
        
        questions.forEach((q, qIdx) => {
            const selected = document.querySelector(`input[name="q${qIdx}"]:checked`);
            const labels = document.querySelectorAll(`input[name="q${qIdx}"]`);
            
            labels.forEach(input => {
                const label = input.parentElement;
                const val = parseInt(input.value);
                
                if(val === q.correct) label.classList.add('correct');
                if(selected && parseInt(selected.value) === val && val !== q.correct) {
                    label.classList.add('wrong');
                }
                input.disabled = true;
            });

            if(selected && parseInt(selected.value) === q.correct) score++;
        });

        const percent = (score / questions.length) * 100;
        const msg = document.getElementById('result-msg');
        msg.style.display = 'block';

        if(percent >= 80) {
            msg.innerHTML = `<span style="color:var(--success)">Zaliczone! ✅ Wynik: ${score}/${questions.length}</span>`;
            if(!unlockedLessons.includes(currentLesson.id + 1) && currentLesson.id < lessonsData.length) {
                unlockedLessons.push(currentLesson.id + 1);
                localStorage.setItem('geo_unlocked', JSON.stringify(unlockedLessons));
            }
        } else {
            msg.innerHTML = `<span style="color:var(--error)">Spróbuj ponownie ❌ Wynik: ${score}/${questions.length} (wymagane 80%)</span>`;
        }

        document.getElementById('check-btn').style.display = 'none';
        updateProgress();
    }

    function updateProgress() {
        const total = lessonsData.length;
        const completed = unlockedLessons.length - 1;
        const percent = Math.round((completed / total) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `Postęp: ${percent}%`;
    }

    init();
</script>
